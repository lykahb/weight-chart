<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weight Loss Chart - SVG</title>
  <style>
    @page {
      size: letter landscape;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    #chart {
      display: block;
      width: 100%;
      margin: 0 auto;
    }
    @media print {
      #chart {
        width: 100%;
        height: auto;
      }
    }
    #chart .bg {
      fill: #fff;
    }
    #chart .weekend {
      fill: rgba(0, 0, 0, 0.08);
    }
    #chart .month-boundary {
      stroke: #000;
      stroke-width: 3;
    }
    #chart .month-label {
      fill: #000;
      font-size: 20px;
      font-weight: 700;
      text-anchor: middle;
    }
    #chart .weekday-label {
      fill: #000;
      font-size: 10px;
      font-weight: bold;
      text-anchor: middle;
    }
    #chart .axis-label {
      fill: #000;
      font-size: 20px;
      font-weight: bold;
      text-anchor: end;
    }
    #chart .marker-row.major {
      fill: none;
      stroke: #000;
      stroke-width: 0.8;
    }
    #chart .marker-row.integer {
      fill: none;
      stroke: #000;
      stroke-width: 0.6;
    }
    #chart .marker-row.fraction {
      fill: #000;
      stroke: none;
    }
  </style>
</head>
<body>
  <svg id="chart" aria-label="Weight chart" role="img"></svg>
  <script>
    (function() {
      const SVG_NS = 'http://www.w3.org/2000/svg';

      // Config
      const startDate = new Date(2026, 2, 1);
      const endDate   = new Date(2026, 7, 31);
      const weightLower = 130, weightUpper = 170, weightStep = 0.2;
      const weekdayNames = ['S','M','T','W','T','F','S'];
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      const axisWidth = 50;
      const monthHeaderHeight = 50;
      const weekdayHeaderHeight = 40;
      const dayCellWidth = 10;
      const rowCellHeight = 7;

      const months = [];
      for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
        const m = d.getMonth();
        if (!months.length || months[months.length - 1].name !== monthNames[m]) {
          months.push({ name: monthNames[m], days: 0 });
        }
        months[months.length - 1].days++;
      }

      const totalDays = months.reduce((sum, m) => sum + m.days, 0);
      const startDay = startDate.getDay();
      const steps = Math.round((weightUpper - weightLower) / weightStep);
      const chartWidth = axisWidth + totalDays * dayCellWidth;
      const bodyHeight = (steps + 1) * rowCellHeight;
      const chartHeight = monthHeaderHeight + weekdayHeaderHeight + bodyHeight;
      const dayWidth = (chartWidth - axisWidth) / totalDays;
      const rowHeight = bodyHeight / (steps + 1);

      function el(name, attrs) {
        const node = document.createElementNS(SVG_NS, name);
        if (attrs) {
          for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, String(v));
        }
        return node;
      }

      const svg = document.getElementById('chart');
      svg.setAttribute('xmlns', SVG_NS);
      svg.setAttribute('viewBox', `0 0 ${chartWidth} ${chartHeight}`);
      svg.setAttribute('preserveAspectRatio', 'xMinYMin meet');

      // Base background
      svg.appendChild(el('rect', {
        x: 0, y: 0, width: chartWidth, height: chartHeight, class: 'bg'
      }));

      // Marker templates: one marker per type, reused via <use> in row groups.
      function markerType(id, radius) {
        const group = el('g', { id });
        group.appendChild(el('circle', { cx: 0, cy: 0, r: radius }));
        return group;
      }
      function markerRowGroup(id, markerId) {
        const group = el('g', { id });
        for (let c = 0; c < totalDays; c++) {
          const cx = axisWidth + c * dayWidth + dayWidth / 2;
          group.appendChild(el('use', {
            href: markerId,
            transform: `translate(${cx} 0)`
          }));
        }
        return group;
      }
      const defs = el('defs');
      defs.appendChild(markerType('marker-major-type', 3.0));
      defs.appendChild(markerType('marker-integer-type', 2.3));
      defs.appendChild(markerType('marker-fraction-type', 1.1));
      defs.appendChild(markerRowGroup('marker-major-template', '#marker-major-type'));
      defs.appendChild(markerRowGroup('marker-integer-template', '#marker-integer-type'));
      defs.appendChild(markerRowGroup('marker-fraction-template', '#marker-fraction-type'));
      svg.appendChild(defs);

      // Weekend shading (weekday header + body)
      for (let c = 0; c < totalDays; c++) {
        const idx = (startDay + c) % 7;
        if (idx === 0 || idx === 6) {
          svg.appendChild(el('rect', {
            x: axisWidth + c * dayWidth,
            y: monthHeaderHeight,
            width: dayWidth,
            height: chartHeight - monthHeaderHeight,
            class: 'weekend'
          }));
        }
      }

      // Month labels and boundaries
      let dayCursor = 0;
      for (let i = 0; i < months.length; i++) {
        const m = months[i];
        const monthX = axisWidth + dayCursor * dayWidth;
        const monthW = m.days * dayWidth;

        svg.appendChild(el('text', {
          x: monthX + monthW / 2,
          y: monthHeaderHeight / 2 + 12,
          class: 'month-label'
        })).textContent = m.name;

        if (i > 0) {
          svg.appendChild(el('line', {
            x1: monthX,
            y1: 0,
            x2: monthX,
            y2: chartHeight,
            class: 'month-boundary'
          }));
        }
        dayCursor += m.days;
      }

      // Weekday labels
      for (let c = 0; c < totalDays; c++) {
        const idx = (startDay + c) % 7;
        svg.appendChild(el('text', {
          x: axisWidth + c * dayWidth + dayWidth / 2,
          y: monthHeaderHeight + (weekdayHeaderHeight / 2) + 5,
          class: 'weekday-label'
        })).textContent = weekdayNames[idx];
      }

      // Marker circles and axis labels
      const epsilon = 1e-9;
      for (let r = 0; r <= steps; r++) {
        const wVal = weightUpper - r * weightStep;
        const rounded = Math.round(wVal);
        const isInteger = Math.abs(wVal - rounded) < epsilon;
        const isMajor = isInteger && (rounded % 5 === 0);
        const y = monthHeaderHeight + weekdayHeaderHeight + r * rowHeight;

        const templateId = isMajor ? '#marker-major-template' : (isInteger ? '#marker-integer-template' : '#marker-fraction-template');
        const markerClass = isMajor ? 'major' : (isInteger ? 'integer' : 'fraction');
        svg.appendChild(el('use', {
          href: templateId,
          transform: `translate(0 ${y})`,
          class: `marker-row ${markerClass}`
        }));

        if (isMajor) {
          const label = isInteger ? String(rounded) : wVal.toFixed(1);
          svg.appendChild(el('text', {
            x: axisWidth - 8,
            y: y + 10,
            class: 'axis-label'
          })).textContent = label;
        }
      }

    })();
  </script>
</body>
</html>
