<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weight Loss Chart - SVG</title>
  <style>
    @page {
      size: letter landscape;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    #chart {
      display: block;
      width: 100%;
      margin: 0 auto;
    }
    @media print {
      #chart {
        width: 100%;
        height: auto;
      }
    }
    #chart .bg {
      fill: #fff;
    }
    #chart .weekend {
      fill: rgba(0, 0, 0, 0.08);
    }
    #chart .month-boundary {
      stroke: #000;
      stroke-width: 1;
    }
    #chart .month-label {
      fill: #000;
      font-size: 20px;
      font-weight: 700;
      text-anchor: middle;
    }
    #chart .weekday-label {
      fill: #000;
      font-size: 10px;
      font-weight: bold;
      text-anchor: middle;
    }
    #chart .axis-label {
      fill: #000;
      font-size: 20px;
      font-weight: bold;
      text-anchor: end;
      /* Vertically align with the markers */
      transform: translate(0, 7px);
    }
    #chart .marker-row.major {
      fill: none;
      stroke: #000;
      stroke-width: 0.8;
    }
    #chart .marker-row.integer {
      fill: none;
      stroke: #000;
      stroke-width: 0.6;
    }
    #chart .marker-row.fraction {
      fill: #000;
      stroke: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <svg
      id="chart"
      aria-label="Weight chart"
      role="img"
      xmlns="http://www.w3.org/2000/svg"
      :view-box.camel="viewBox"
      :preserve-aspect-ratio.camel="'xMinYMin meet'"
    >
      <rect class="bg" :x="0" :y="0" :width="chartWidth" :height="chartHeight" />

      <defs>
        <g id="marker-major-type"><circle :cx="0" :cy="0" :r="3.0" /></g>
        <g id="marker-integer-type"><circle :cx="0" :cy="0" :r="2.0" /></g>
        <g id="marker-fraction-type"><circle :cx="0" :cy="0" :r="0.5" /></g>

        <g id="marker-major-template">
          <use
            v-for="c in totalDays"
            :key="`major-${c}`"
            href="#marker-major-type"
            :transform="`translate(${axisWidth + (c - 1) * dayWidth + dayWidth / 2} 0)`"
          />
        </g>
        <g id="marker-integer-template">
          <use
            v-for="c in totalDays"
            :key="`integer-${c}`"
            href="#marker-integer-type"
            :transform="`translate(${axisWidth + (c - 1) * dayWidth + dayWidth / 2} 0)`"
          />
        </g>
        <g id="marker-fraction-template">
          <use
            v-for="c in totalDays"
            :key="`fraction-${c}`"
            href="#marker-fraction-type"
            :transform="`translate(${axisWidth + (c - 1) * dayWidth + dayWidth / 2} 0)`"
          />
        </g>
      </defs>

      <rect
        v-for="c in weekendColumns"
        :key="`weekend-${c}`"
        class="weekend"
        :x="axisWidth + c * dayWidth"
        :y="monthHeaderHeight"
        :width="dayWidth"
        :height="chartHeight - monthHeaderHeight"
      />

      <g v-for="(m, i) in monthLayout" :key="`month-${i}`">
        <text
          class="month-label"
          :x="m.x + m.width / 2"
          :y="monthHeaderHeight / 2 + 10"
        >{{ m.name }}</text>
        <line
          v-if="i > 0"
          class="month-boundary"
          :x1="m.x"
          :y1="0"
          :x2="m.x"
          :y2="chartHeight"
        />
      </g>

      <text
        v-for="c in totalDays"
        :key="`weekday-${c}`"
        class="weekday-label"
        :x="axisWidth + (c - 1) * dayWidth + dayWidth / 2"
        :y="monthHeaderHeight + (weekdayHeaderHeight / 2) + 2"
      >{{ weekdayNames[(startDay + (c - 1)) % 7] }}</text>

      <g v-for="row in markerRows" :key="`row-${row.r}`">
        <use
          :href="row.templateId"
          :transform="`translate(0 ${row.y})`"
          :class="`marker-row ${row.markerClass}`"
        />
        <text
          v-if="row.axisLabel !== null"
          class="axis-label"
          :x="axisWidth - 8"
          :y="row.y"
        >{{ row.axisLabel }}</text>
      </g>
    </svg>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        const startYear = 2026;
        const startMonth = 3; // 1-12
        const durationMonths = 6;
        const weightLower = 130;
        const weightUpper = 170;
        const weightStep = 0.2;
        const weekdayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
        const monthNames = [
          'January', 'February', 'March', 'April', 'May', 'June',
          'July', 'August', 'September', 'October', 'November', 'December'
        ];

        const startDate = new Date(startYear, startMonth - 1, 1);
        const endDate = new Date(startYear, startMonth - 1 + durationMonths, 0);

        return {
          startDate,
          endDate,
          weightLower,
          weightUpper,
          weightStep,
          weekdayNames,
          monthNames,
          axisWidth: 50,
          monthHeaderHeight: 40,
          weekdayHeaderHeight: 30,
          dayCellWidth: 10,
          rowCellHeight: 7
        };
      },
      computed: {
        months() {
          const monthGroups = [];
          for (let d = new Date(this.startDate); d <= this.endDate; d.setDate(d.getDate() + 1)) {
            const monthIndex = d.getMonth();
            const last = monthGroups[monthGroups.length - 1];
            if (!last || last.monthIndex !== monthIndex) monthGroups.push({ monthIndex, days: 1 });
            else last.days += 1;
          }
          return monthGroups.map(({ monthIndex, days }) => ({
            name: this.monthNames[monthIndex],
            days
          }));
        },
        totalDays() {
          const msPerDay = 24 * 60 * 60 * 1000;
          return Math.floor((this.endDate - this.startDate) / msPerDay) + 1;
        },
        startDay() {
          return this.startDate.getDay();
        },
        steps() {
          return Math.round((this.weightUpper - this.weightLower) / this.weightStep);
        },
        chartWidth() {
          return this.axisWidth + this.totalDays * this.dayCellWidth;
        },
        bodyHeight() {
          return (this.steps + 1) * this.rowCellHeight;
        },
        chartHeight() {
          return this.monthHeaderHeight + this.weekdayHeaderHeight + this.bodyHeight;
        },
        viewBox() {
          return `0 0 ${this.chartWidth} ${this.chartHeight}`;
        },
        dayWidth() {
          return (this.chartWidth - this.axisWidth) / this.totalDays;
        },
        rowHeight() {
          return this.bodyHeight / (this.steps + 1);
        },
        weekendColumns() {
          const cols = [];
          for (let c = 0; c < this.totalDays; c++) {
            const idx = (this.startDay + c) % 7;
            if (idx === 0 || idx === 6) cols.push(c);
          }
          return cols;
        },
        monthLayout() {
          let dayCursor = 0;
          return this.months.map((m) => {
            const x = this.axisWidth + dayCursor * this.dayWidth;
            const width = m.days * this.dayWidth;
            dayCursor += m.days;
            return { name: m.name, x, width };
          });
        },
        markerRows() {
          const rows = [];
          for (let r = 0; r <= this.steps; r++) {
            const wVal = this.weightUpper - r * this.weightStep;
            const { axisLabel, markerClass, templateId } = this.classifyWeightRow(wVal);
            rows.push({
              r,
              y: this.monthHeaderHeight + this.weekdayHeaderHeight + r * this.rowHeight,
              axisLabel,
              markerClass,
              templateId
            });
          }
          return rows;
        }
      },
      methods: {
        classifyWeightRow(wVal) {
          const rounded = Math.round(wVal);
          const epsilon = 1e-9;
          const isInteger = Math.abs(wVal - rounded) < epsilon;
          const isMajor = isInteger && (rounded % 5 === 0);
          const markerClass = isMajor ? 'major' : (isInteger ? 'integer' : 'fraction');
          const templateId = isMajor
            ? '#marker-major-template'
            : (isInteger ? '#marker-integer-template' : '#marker-fraction-template');
          const axisLabel = isMajor ? String(rounded) : null;
          return { axisLabel, markerClass, templateId };
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
