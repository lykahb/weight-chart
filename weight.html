<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weight Loss Chart - SVG</title>
  <style>
    @page { margin: 10mm; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    #chart {
      display: block;
      width: 100%;
      margin: 0 auto;
    }
    @media print {
      #chart {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <svg id="chart" aria-label="Weight chart" role="img"></svg>
  <script>
    (function() {
      const SVG_NS = 'http://www.w3.org/2000/svg';

      // Config
      const startDate = new Date(2026, 2, 1);
      const endDate   = new Date(2026, 7, 31);
      const weightLower = 130, weightUpper = 170, weightStep = 0.2;
      const weekdayNames = ['S','M','T','W','T','F','S'];
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      const axisWidth = 10;
      const monthHeaderHeight = 5;
      const weekdayHeaderHeight = 4;
      const dayCellWidth = 1;
      const rowCellHeight = 1;
      const weekdayFontSizePt = 4;
      const ptToMm = 25.4 / 72;

      const months = [];
      for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
        const m = d.getMonth();
        if (!months.length || months[months.length - 1].name !== monthNames[m]) {
          months.push({ name: monthNames[m], days: 0 });
        }
        months[months.length - 1].days++;
      }

      const totalDays = months.reduce((sum, m) => sum + m.days, 0);
      const startDay = startDate.getDay();
      const steps = Math.round((weightUpper - weightLower) / weightStep);
      const chartWidth = axisWidth + totalDays * dayCellWidth;
      const bodyHeight = (steps + 1) * rowCellHeight;
      const chartHeight = monthHeaderHeight + weekdayHeaderHeight + bodyHeight;
      const dayWidth = (chartWidth - axisWidth) / totalDays;
      const rowHeight = bodyHeight / (steps + 1);

      function el(name, attrs) {
        const node = document.createElementNS(SVG_NS, name);
        if (attrs) {
          for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, String(v));
        }
        return node;
      }

      const svg = document.getElementById('chart');
      svg.setAttribute('xmlns', SVG_NS);
      svg.setAttribute('viewBox', `0 0 ${chartWidth} ${chartHeight}`);
      svg.setAttribute('preserveAspectRatio', 'xMinYMin meet');

      // Base background
      svg.appendChild(el('rect', {
        x: 0, y: 0, width: chartWidth, height: chartHeight, fill: '#fff'
      }));

      // Reusable marker symbols to reduce output size
      const defs = el('defs');
      const markerDot = el('symbol', { id: 'marker-dot' });
      markerDot.appendChild(el('circle', { cx: 0, cy: 0, r: 0.23, fill: '#000' }));
      defs.appendChild(markerDot);
      const markerRing = el('symbol', { id: 'marker-ring' });
      markerRing.appendChild(el('circle', {
        cx: 0, cy: 0, r: 0.23, fill: 'none', stroke: '#000', 'stroke-width': 0.06
      }));
      defs.appendChild(markerRing);
      svg.appendChild(defs);

      // Weekend shading (weekday header + body)
      for (let c = 0; c < totalDays; c++) {
        const idx = (startDay + c) % 7;
        if (idx === 0 || idx === 6) {
          svg.appendChild(el('rect', {
            x: axisWidth + c * dayWidth,
            y: monthHeaderHeight,
            width: dayWidth,
            height: chartHeight - monthHeaderHeight,
            fill: 'rgba(0,0,0,0.08)'
          }));
        }
      }

      // Day grid lines
      for (let c = 0; c <= totalDays; c++) {
        svg.appendChild(el('line', {
          x1: axisWidth + c * dayWidth,
          y1: monthHeaderHeight + weekdayHeaderHeight,
          x2: axisWidth + c * dayWidth,
          y2: chartHeight,
          stroke: '#777',
          'stroke-width': 0.06
        }));
      }

      // Horizontal rows
      for (let r = 0; r <= steps; r++) {
        const wVal = weightUpper - r * weightStep;
        const isMarker = r % Math.round(5 / weightStep) === 0;
        const isInteger = Number.isInteger(wVal);
        svg.appendChild(el('line', {
          x1: axisWidth,
          y1: monthHeaderHeight + weekdayHeaderHeight + r * rowHeight,
          x2: chartWidth,
          y2: monthHeaderHeight + weekdayHeaderHeight + r * rowHeight,
          stroke: '#000',
          'stroke-width': isMarker ? 0.20 : (isInteger ? 0.11 : 0.06),
          'stroke-opacity': isMarker ? 0.70 : (isInteger ? 0.45 : 0.20)
        }));
      }

      // Month labels and boundaries
      let dayCursor = 0;
      for (let i = 0; i < months.length; i++) {
        const m = months[i];
        const monthX = axisWidth + dayCursor * dayWidth;
        const monthW = m.days * dayWidth;

        svg.appendChild(el('text', {
          x: monthX + monthW / 2,
          y: monthHeaderHeight / 2 + 1.2,
          'text-anchor': 'middle',
          'font-size': 3.2,
          'font-weight': '700',
          fill: '#000'
        })).textContent = m.name;

        if (i > 0) {
          svg.appendChild(el('line', {
            x1: monthX,
            y1: 0,
            x2: monthX,
            y2: chartHeight,
            stroke: '#000',
            'stroke-width': 0.3
          }));
        }
        dayCursor += m.days;
      }

      // Weekday labels
      for (let c = 0; c < totalDays; c++) {
        const idx = (startDay + c) % 7;
        svg.appendChild(el('text', {
          x: axisWidth + c * dayWidth + dayWidth / 2,
          y: monthHeaderHeight + (weekdayHeaderHeight / 2) + 0.5,
          'text-anchor': 'middle',
          'font-size': (weekdayFontSizePt * ptToMm).toFixed(3),
          fill: '#000'
        })).textContent = weekdayNames[idx];
      }

      // Marker circles and axis labels
      const markerRowModulo = Math.round(5 / weightStep);
      for (let r = 0; r <= steps; r++) {
        const wVal = weightUpper - r * weightStep;
        const isMarker = r % markerRowModulo === 0;
        const isInteger = Number.isInteger(wVal);
        const y = monthHeaderHeight + weekdayHeaderHeight + r * rowHeight;

        if (isMarker || isInteger) {
          const href = isMarker ? '#marker-dot' : '#marker-ring';
          for (let c = 0; c < totalDays; c++) {
            svg.appendChild(el('use', {
              href: href,
              x: axisWidth + c * dayWidth + dayWidth / 2,
              y: y
            }));
          }
        }

        if (isMarker) {
          const label = Number.isInteger(wVal) ? String(wVal) : wVal.toFixed(1);
          svg.appendChild(el('text', {
            x: axisWidth - 0.8,
            y: y + 1.0,
            'text-anchor': 'end',
            'font-size': 3.0,
            fill: '#000'
          })).textContent = label;
        }
      }

      // Outer border
      svg.appendChild(el('rect', {
        x: axisWidth,
        y: monthHeaderHeight + weekdayHeaderHeight,
        width: chartWidth - axisWidth,
        height: bodyHeight,
        fill: 'none',
        stroke: '#000',
        'stroke-width': 0.25
      }));
    })();
  </script>
</body>
</html>
